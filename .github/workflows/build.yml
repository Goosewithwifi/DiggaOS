name: Build DiggaOS Enlightenment Edition
on: [push, workflow_dispatch]

jobs:
  build:
    runs-on: ubuntu-latest
    container:
      image: alpine:3.23
    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Install build tools
      run: |
        apk update
        apk add --no-cache alpine-sdk build-base apk-tools alpine-conf busybox \
          fakeroot syslinux xorriso squashfs-tools mtools dosfstools grub-efi \
          git bash coreutils

    - name: Verify logo exists in repo
      run: |
        if [ ! -f "branding/logo.png" ]; then
          echo "FATAL: branding/logo.png not found in repo."
          echo "Commit your goose logo to branding/logo.png before running this workflow."
          exit 1
        fi
        cp branding/logo.png /tmp/diggaos-logo.png
        echo "✓ Logo found and staged: $(ls -lh /tmp/diggaos-logo.png)"

    - name: Clone Alpine build scripts
      run: |
        git clone --depth=1 https://gitlab.alpinelinux.org/alpine/aports.git /tmp/aports
        test -f /tmp/aports/scripts/mkimage.sh || { echo "FATAL: mkimage.sh not found after clone"; exit 1; }
        echo "✓ aports cloned"

    - name: Patch mkimage.sh for apk 3.x compatibility
      run: |
        # Current apk (3.x, shipped with Alpine 3.23) removed the --no-chown flag.
        # mkimage.sh still passes it, which surfaces as a misleading
        # "ERROR: --usermode not allowed as root" instead of an "unknown option" error.
        if grep -q -- '--no-chown' /tmp/aports/scripts/mkimage.sh; then
          echo "Found incompatible --no-chown flag — removing it"
          sed -i 's/ --no-chown//g' /tmp/aports/scripts/mkimage.sh
          if grep -q -- '--no-chown' /tmp/aports/scripts/mkimage.sh; then
            echo "FATAL: patch did not remove all instances"
            exit 1
          fi
          echo "✓ mkimage.sh patched successfully"
        else
          echo "No --no-chown flag found in mkimage.sh — already compatible, no patch needed"
        fi

    - name: Write custom DiggaOS profile
      run: |
        printf '%s\n' \
          'profile_diggaos() {' \
          '  profile_extended' \
          '  apks="$apks enlightenment xorg-server xf86-video-fbdev xf86-video-vesa"' \
          '  apks="$apks mesa-dri-swrast mesa-gl mesa-egl eudev eudev-init"' \
          '  apks="$apks dbus dbus-x11 util-linux terminology"' \
          '  apks="$apks ttf-dejavu font-noto setxkbmap xinit mkfontscale"' \
          '  local _k _a' \
          '  for _k in $kernel_flavors; do' \
          '    apks="$apks linux-$_k"' \
          '    for _a in $kernel_addons; do' \
          '      apks="$apks $_a-$_k"' \
          '    done' \
          '  done' \
          '  apks="$apks linux-firmware-none"' \
          '  hostname="diggaos"' \
          '  apkovl="genapkovl-diggaos.sh"' \
          '}' \
          > /tmp/aports/scripts/mkimg.diggaos.sh
        test -s /tmp/aports/scripts/mkimg.diggaos.sh || { echo "FATAL: profile script is empty"; exit 1; }
        echo "✓ Profile written"
        cat /tmp/aports/scripts/mkimg.diggaos.sh

    - name: Write custom apkovl branding overlay
      run: |
        printf '%s\n' \
          '#!/bin/sh -e' \
          'HOSTNAME="$1"' \
          'if [ -z "$HOSTNAME" ]; then' \
          '  echo "usage: $0 hostname"' \
          '  exit 1' \
          'fi' \
          'cleanup() {' \
          '  rm -rf "$tmp"' \
          '}' \
          'makefile() {' \
          '  OWNER="$1"' \
          '  PERMS="$2"' \
          '  FILENAME="$3"' \
          '  cat > "$FILENAME"' \
          '  chown "$OWNER" "$FILENAME"' \
          '  chmod "$PERMS" "$FILENAME"' \
          '}' \
          'rc_add() {' \
          '  mkdir -p "$tmp"/etc/runlevels/"$2"' \
          '  ln -sf /etc/init.d/"$1" "$tmp"/etc/runlevels/"$2"/"$1"' \
          '}' \
          'tmp="$(mktemp -d)"' \
          'trap cleanup EXIT' \
          'mkdir -p "$tmp"/etc' \
          'makefile root:root 0644 "$tmp"/etc/hostname <<EOF' \
          '$HOSTNAME' \
          'EOF' \
          'mkdir -p "$tmp"/etc/network' \
          'makefile root:root 0644 "$tmp"/etc/network/interfaces <<EOF' \
          'auto lo' \
          'iface lo inet loopback' \
          '' \
          'auto eth0' \
          'iface eth0 inet dhcp' \
          'EOF' \
          'makefile root:root 0644 "$tmp"/etc/os-release <<EOF' \
          'NAME="DiggaOS"' \
          'PRETTY_NAME="DiggaOS - Enlightenment Edition"' \
          'ID=diggaos' \
          'ID_LIKE=alpine' \
          'VERSION="3.0"' \
          'HOME_URL="https://github.com/Goosewithwifi/Completely-ai-made-os"' \
          'EOF' \
          'makefile root:root 0644 "$tmp"/etc/motd <<EOF' \
          'Welcome to DiggaOS - Enlightenment Edition' \
          'EOF' \
          'makefile root:root 0644 "$tmp"/etc/passwd <<EOF' \
          'root:x:0:0:root:/root:/bin/ash' \
          'digga:x:1000:1000:DiggaOS User:/home/digga:/bin/ash' \
          'EOF' \
          'makefile root:root 0640 "$tmp"/etc/shadow <<EOF' \
          'root::10933:0:::::' \
          'digga::10933:0:::::' \
          'EOF' \
          'makefile root:root 0644 "$tmp"/etc/group <<EOF' \
          'root:x:0:' \
          'digga:x:1000:' \
          'video:x:28:digga' \
          'audio:x:29:digga' \
          'input:x:998:digga' \
          'EOF' \
          'mkdir -p "$tmp"/home/digga/.config/enlightenment-autostart' \
          'mkdir -p "$tmp"/usr/share/diggaos' \
          'if [ -f /tmp/diggaos-logo.png ]; then' \
          '  cp /tmp/diggaos-logo.png "$tmp"/usr/share/diggaos/logo.png' \
          'fi' \
          'makefile 1000:1000 0755 "$tmp"/home/digga/.xinitrc <<EOF' \
          '#!/bin/sh' \
          'exec enlightenment_start' \
          'EOF' \
          'makefile 1000:1000 0755 "$tmp"/home/digga/.config/enlightenment-autostart/set-wallpaper.sh <<EOF' \
          '#!/bin/sh' \
          'sleep 5' \
          'enlightenment_remote -desktop-bg-add 0 0 0 0 /usr/share/diggaos/logo.png 2>/dev/null || true' \
          'EOF' \
          'makefile 1000:1000 0644 "$tmp"/home/digga/.profile <<EOF' \
          'if [ -z "$DISPLAY" ] && [ "$(tty)" = "/dev/tty1" ]; then' \
          '  startx' \
          'fi' \
          'EOF' \
          'mkdir -p "$tmp"/etc/apk' \
          'makefile root:root 0644 "$tmp"/etc/apk/world <<EOF' \
          'alpine-base' \
          'enlightenment' \
          'xorg-server' \
          'dbus' \
          'eudev' \
          'EOF' \
          'rc_add devfs sysinit' \
          'rc_add dmesg sysinit' \
          'rc_add mdev sysinit' \
          'rc_add hwdrivers sysinit' \
          'rc_add modloop sysinit' \
          'rc_add hwclock boot' \
          'rc_add modules boot' \
          'rc_add sysctl boot' \
          'rc_add hostname boot' \
          'rc_add bootmisc boot' \
          'rc_add syslog boot' \
          'rc_add networking boot' \
          'rc_add dbus default' \
          'rc_add local default' \
          'rc_add mount-ro shutdown' \
          'rc_add killprocs shutdown' \
          'rc_add savecache shutdown' \
          'tar -c -C "$tmp" etc home usr | gzip -9n > $HOSTNAME.apkovl.tar.gz' \
          > /tmp/aports/scripts/genapkovl-diggaos.sh
        chmod +x /tmp/aports/scripts/genapkovl-diggaos.sh
        test -s /tmp/aports/scripts/genapkovl-diggaos.sh || { echo "FATAL: overlay script is empty"; exit 1; }
        echo "✓ Overlay script written"

    - name: Build ISO with mkimage.sh
      run: |
        set -e
        mkdir -p /tmp/build-out
        cd /tmp/aports/scripts
        ./mkimage.sh \
          --tag v3.23 \
          --outdir /tmp/build-out \
          --arch x86_64 \
          --repository http://dl-cdn.alpinelinux.org/alpine/v3.23/main \
          --repository http://dl-cdn.alpinelinux.org/alpine/v3.23/community \
          --profile diggaos
        echo "=== Build output directory ==="
        ls -la /tmp/build-out

    - name: Verify and rename ISO
      run: |
        ISO_FILE=$(find /tmp/build-out -name "*.iso" | head -1)
        test -n "$ISO_FILE" || { echo "FATAL: no ISO produced by mkimage.sh"; exit 1; }
        test -s "$ISO_FILE" || { echo "FATAL: ISO file is empty"; exit 1; }
        cp "$ISO_FILE" diggaos-enlightenment.iso
        echo "✓ ISO built: $(ls -lh diggaos-enlightenment.iso)"

    - name: Upload Artifact
      uses: actions/upload-artifact@v4
      with:
        name: diggaos-enlightenment
        path: diggaos-enlightenment.iso

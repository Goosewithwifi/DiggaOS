name: Build DiggaOS COSMIC Edition
on: [push, workflow_dispatch]

jobs:
  build:
    runs-on: ubuntu-latest
    container:
      image: alpine:3.24
    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Install build tools
      run: |
        apk update
        apk add --no-cache alpine-sdk build-base apk-tools alpine-conf busybox \
          fakeroot syslinux xorriso squashfs-tools mtools dosfstools grub-efi \
          git bash coreutils

    - name: Verify logo and wallpapers exist in repo
      run: |
        if [ ! -f "branding/logo.png" ]; then
          echo "FATAL: branding/logo.png not found in repo."
          exit 1
        fi
        if [ ! -d "DiggaOS/wallpapers" ]; then
          echo "FATAL: DiggaOS/wallpapers/ directory not found in repo."
          exit 1
        fi
        mkdir -p /tmp/diggaos-wallpapers
        find "DiggaOS/wallpapers" -maxdepth 1 -type f \( -iname "*.png" -o -iname "*.jpg" -o -iname "*.jpeg" \) -exec cp {} /tmp/diggaos-wallpapers/ \;
        WALLPAPER_COUNT=$(find /tmp/diggaos-wallpapers -type f | wc -l)
        if [ "$WALLPAPER_COUNT" -eq 0 ]; then
          echo "FATAL: no wallpaper images (.png/.jpg/.jpeg) found in DiggaOS/wallpapers/"
          exit 1
        fi
        cp branding/logo.png /tmp/diggaos-logo.png
        echo "✓ Logo staged: $(ls -lh /tmp/diggaos-logo.png)"
        echo "✓ Staged $WALLPAPER_COUNT wallpaper(s):"
        ls -lh /tmp/diggaos-wallpapers/

    - name: Clone Alpine build scripts
      run: |
        git clone --depth=1 https://gitlab.alpinelinux.org/alpine/aports.git /tmp/aports
        test -f /tmp/aports/scripts/mkimage.sh || { echo "FATAL: mkimage.sh not found after clone"; exit 1; }
        echo "✓ aports cloned"

    - name: Patch mkimage.sh for apk 3.x compatibility
      run: |
        # Current apk (3.x) removed the --no-chown flag. mkimage.sh still passes it,
        # which surfaces as a misleading "ERROR: --usermode not allowed as root"
        # instead of an "unknown option" error.
        if grep -q -- '--no-chown' /tmp/aports/scripts/mkimage.sh; then
          echo "Found incompatible --no-chown flag — removing it"
          sed -i 's/ --no-chown//g' /tmp/aports/scripts/mkimage.sh
          if grep -q -- '--no-chown' /tmp/aports/scripts/mkimage.sh; then
            echo "FATAL: patch did not remove all instances"
            exit 1
          fi
          echo "✓ mkimage.sh patched successfully"
        else
          echo "No --no-chown flag found — already compatible"
        fi

    - name: Write custom DiggaOS profile
      run: |
        printf '%s\n' \
          'profile_diggaos() {' \
          '  profile_extended' \
          '  modloop_sign="no"' \
          '  apks="$apks cosmic-session"' \
          '  apks="$apks eudev dbus elogind polkit-elogind"' \
          '  apks="$apks mesa-dri-gallium mesa-egl"' \
          '  apks="$apks ttf-dejavu font-noto"' \
          '  apks="$apks adwaita-icon-theme desktop-file-utils gnome-keyring hicolor-icon-theme musl-locales"' \
          '  local _k _a' \
          '  for _k in $kernel_flavors; do' \
          '    apks="$apks linux-$_k"' \
          '    for _a in $kernel_addons; do' \
          '      apks="$apks $_a-$_k"' \
          '    done' \
          '  done' \
          '  apks="$apks linux-firmware-none"' \
          '  hostname="diggaos"' \
          '  apkovl="genapkovl-diggaos.sh"' \
          '}' \
          > /tmp/aports/scripts/mkimg.diggaos.sh
        test -s /tmp/aports/scripts/mkimg.diggaos.sh || { echo "FATAL: profile script is empty"; exit 1; }
        echo "✓ Profile written"
        cat /tmp/aports/scripts/mkimg.diggaos.sh

    - name: Write custom apkovl branding overlay
      run: |
        printf '%s\n' \
          '#!/bin/sh -e' \
          'HOSTNAME="$1"' \
          'if [ -z "$HOSTNAME" ]; then' \
          '  echo "usage: $0 hostname"' \
          '  exit 1' \
          'fi' \
          'cleanup() {' \
          '  rm -rf "$tmp"' \
          '}' \
          'makefile() {' \
          '  OWNER="$1"' \
          '  PERMS="$2"' \
          '  FILENAME="$3"' \
          '  cat > "$FILENAME"' \
          '  chown "$OWNER" "$FILENAME"' \
          '  chmod "$PERMS" "$FILENAME"' \
          '}' \
          'rc_add() {' \
          '  mkdir -p "$tmp"/etc/runlevels/"$2"' \
          '  ln -sf /etc/init.d/"$1" "$tmp"/etc/runlevels/"$2"/"$1"' \
          '}' \
          'tmp="$(mktemp -d)"' \
          'trap cleanup EXIT' \
          'mkdir -p "$tmp"/etc' \
          'makefile root:root 0644 "$tmp"/etc/hostname <<EOF' \
          '$HOSTNAME' \
          'EOF' \
          'mkdir -p "$tmp"/etc/network' \
          'makefile root:root 0644 "$tmp"/etc/network/interfaces <<EOF' \
          'auto lo' \
          'iface lo inet loopback' \
          '' \
          'auto eth0' \
          'iface eth0 inet dhcp' \
          'EOF' \
          'makefile root:root 0644 "$tmp"/etc/os-release <<EOF' \
          'NAME="DiggaOS"' \
          'PRETTY_NAME="DiggaOS - COSMIC Edition"' \
          'ID=diggaos' \
          'ID_LIKE=alpine' \
          'VERSION="3.0"' \
          'HOME_URL="https://github.com/Goosewithwifi/Completely-ai-made-os"' \
          'EOF' \
          'makefile root:root 0644 "$tmp"/etc/motd <<EOF' \
          'Welcome to DiggaOS - COSMIC Edition' \
          'EOF' \
          'makefile root:root 0644 "$tmp"/etc/passwd <<EOF' \
          'root:x:0:0:root:/root:/bin/ash' \
          'digga:x:1000:1000:DiggaOS User:/home/digga:/bin/ash' \
          'EOF' \
          'makefile root:root 0640 "$tmp"/etc/shadow <<EOF' \
          'root::10933:0:::::' \
          'digga::10933:0:::::' \
          'EOF' \
          'makefile root:root 0644 "$tmp"/etc/group <<EOF' \
          'root:x:0:' \
          'digga:x:1000:' \
          'video:x:28:digga' \
          'audio:x:29:digga' \
          'input:x:998:digga' \
          'EOF' \
          'mkdir -p "$tmp"/home/digga/.config/cosmic/com.system76.CosmicBackground/v1' \
          'mkdir -p "$tmp"/usr/share/diggaos/wallpapers' \
          'if [ -f /tmp/diggaos-logo.png ]; then' \
          '  cp /tmp/diggaos-logo.png "$tmp"/usr/share/diggaos/logo.png' \
          'fi' \
          'if [ -d /tmp/diggaos-wallpapers ]; then' \
          '  cp /tmp/diggaos-wallpapers/*.png "$tmp"/usr/share/diggaos/wallpapers/ 2>/dev/null || true' \
          '  cp /tmp/diggaos-wallpapers/*.jpg "$tmp"/usr/share/diggaos/wallpapers/ 2>/dev/null || true' \
          '  cp /tmp/diggaos-wallpapers/*.jpeg "$tmp"/usr/share/diggaos/wallpapers/ 2>/dev/null || true' \
          'fi' \
          'makefile 1000:1000 0644 "$tmp"/home/digga/.config/cosmic/com.system76.CosmicBackground/v1/all <<EOF' \
          '(' \
          '    output: "all",' \
          '    source: Path("/usr/share/diggaos/wallpapers/"),' \
          '    filter_by_theme: false,' \
          '    rotation_frequency: 300,' \
          '    filter_method: Lanczos,' \
          '    scaling_mode: Zoom,' \
          '    sampling_method: Alphanumeric,' \
          ')' \
          'EOF' \
          'makefile 1000:1000 0644 "$tmp"/home/digga/.profile <<EOF' \
          'if [ -z "\$WAYLAND_DISPLAY" ] && [ "\$(tty)" = "/dev/tty1" ]; then' \
          '  start-cosmic' \
          'fi' \
          'EOF' \
          'mkdir -p "$tmp"/etc/apk' \
          'makefile root:root 0644 "$tmp"/etc/apk/world <<EOF' \
          'alpine-base' \
          'cosmic-session' \
          'eudev' \
          'dbus' \
          'elogind' \
          'EOF' \
          'rc_add devfs sysinit' \
          'rc_add dmesg sysinit' \
          'rc_add udev sysinit' \
          'rc_add udev-trigger sysinit' \
          'rc_add udev-settle sysinit' \
          'rc_add modloop sysinit' \
          'rc_add hwclock boot' \
          'rc_add modules boot' \
          'rc_add sysctl boot' \
          'rc_add hostname boot' \
          'rc_add bootmisc boot' \
          'rc_add syslog boot' \
          'rc_add networking boot' \
          'rc_add udev-postmount default' \
          'rc_add dbus default' \
          'rc_add elogind default' \
          'rc_add local default' \
          'rc_add mount-ro shutdown' \
          'rc_add killprocs shutdown' \
          'rc_add savecache shutdown' \
          'tar -c -C "$tmp" etc home usr | gzip -9n > $HOSTNAME.apkovl.tar.gz' \
          > /tmp/aports/scripts/genapkovl-diggaos.sh
        chmod +x /tmp/aports/scripts/genapkovl-diggaos.sh
        test -s /tmp/aports/scripts/genapkovl-diggaos.sh || { echo "FATAL: overlay script is empty"; exit 1; }
        echo "✓ Overlay script written"

    - name: Generate local signing key
      run: |
        # mkimage.sh signs the local package index it bundles onto the ISO.
        # This is our own throwaway key (not Alpine's official one) — fine for
        # a personal build, just needed so the signing step has something to use.
        abuild-keygen -a -n
        test -f "$HOME/.abuild/abuild.conf" || { echo "FATAL: abuild-keygen did not create config"; exit 1; }
        grep -q PACKAGER_PRIVKEY "$HOME/.abuild/abuild.conf" || { echo "FATAL: PACKAGER_PRIVKEY not set"; exit 1; }
        echo "✓ Signing key generated"

    - name: Generate signing key for abuild
      run: |
        # mkimage.sh signs the local package index it builds; a fresh container
        # has no key at all. This generates a throwaway self-signed keypair
        # (fine for a personal ISO — we're not matching Alpine's own trust chain)
        # and installs it non-interactively, per the error message's own instructions.
        abuild-keygen -a -i -n
        test -n "$(find /root/.abuild -name '*.rsa' 2>/dev/null)" || { echo "FATAL: no key generated"; exit 1; }
        echo "✓ Signing key generated and installed"

    - name: Build ISO with mkimage.sh
      run: |
        set -e
        mkdir -p /tmp/build-out
        cd /tmp/aports/scripts
        ./mkimage.sh \
          --tag v3.24 \
          --outdir /tmp/build-out \
          --arch x86_64 \
          --repository http://dl-cdn.alpinelinux.org/alpine/v3.24/main \
          --repository http://dl-cdn.alpinelinux.org/alpine/v3.24/community \
          --profile diggaos
        echo "=== Build output directory ==="
        ls -la /tmp/build-out

    - name: Verify and rename ISO
      run: |
        ISO_FILE=$(find /tmp/build-out -name "*.iso" | head -1)
        test -n "$ISO_FILE" || { echo "FATAL: no ISO produced by mkimage.sh"; exit 1; }
        test -s "$ISO_FILE" || { echo "FATAL: ISO file is empty"; exit 1; }
        cp "$ISO_FILE" diggaos-cosmic.iso
        echo "✓ ISO built: $(ls -lh diggaos-cosmic.iso)"

    - name: Upload Artifact
      uses: actions/upload-artifact@v4
      with:
        name: diggaos-cosmic
        path: diggaos-cosmic.iso

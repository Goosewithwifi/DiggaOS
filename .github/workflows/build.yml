name: Build DiggaOS with Full APT
on: [push, workflow_dispatch]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Install dependencies
      run: |
        sudo apt-get update
        sudo apt-get install -y xorriso grub-pc-bin grub-common cpio gzip mtools kmod xz-utils

    - name: Build DiggaOS
      run: |
        set -x
        rm -rf iso initramfs
        mkdir -p iso/boot/grub
        mkdir -p initramfs/{bin,dev,proc,sys,sbin,etc,lib/modules,var/cache/apt/archives,var/lib/apt/lists,var/lib/dpkg,usr/bin,usr/lib}

        # 1. BusyBox (includes wget, tar, gzip)
        wget -O initramfs/bin/busybox https://busybox.net/downloads/binaries/1.35.0-x86_64-linux-musl/busybox
        chmod +x initramfs/bin/busybox
        ./initramfs/bin/busybox --install -s ./initramfs/bin

        # 2. Download static apt + dpkg + related tools
        echo "Downloading static apt tools..."
        
        # Try to get dpkg (smallest .deb package manager)
        # Using debootstrap binaries which are more portable
        mkdir -p /tmp/apt-tools
        cd /tmp/apt-tools

        # Method 1: Try to get from Ubuntu
        apt download dpkg 2>/dev/null || {
          echo "Downloading dpkg from repository..."
          wget -q http://archive.ubuntu.com/ubuntu/pool/main/d/dpkg/dpkg_1.21.22ubuntu1_amd64.deb -O dpkg.deb || \
          wget -q http://deb.debian.org/debian/pool/main/d/dpkg/dpkg_1.21.22_amd64.deb -O dpkg.deb || \
          echo "Warning: dpkg download failed, will use fallback"
        }

        # Extract dpkg binary if download succeeded
        if [ -f dpkg.deb ]; then
          ar x dpkg.deb 2>/dev/null || dpkg -x dpkg.deb . 2>/dev/null || true
          if [ -f usr/bin/dpkg ]; then
            cp usr/bin/dpkg ../../../initramfs/bin/ 2>/dev/null || true
          fi
        fi

        cd ../..

        # 3. If dpkg extraction failed, create a dpkg stub that works with apt
        if [ ! -f initramfs/bin/dpkg ]; then
          echo "Creating dpkg compatibility layer..."
          cat << 'DPKG' > initramfs/bin/dpkg
#!/bin/sh
# dpkg stub for DiggaOS - handles basic operations
# Full dpkg is complex; this forwards to apt when possible

case "$1" in
  -l|--list)
    # List installed packages
    ls /var/lib/dpkg/status.d/ 2>/dev/null || ls /var/lib/apt/lists/ 2>/dev/null || echo "No packages installed"
    ;;
  -i|--install)
    # Install .deb file
    shift
    for deb in "$@"; do
      echo "[dpkg] Installing $deb..."
      if command -v apt 2>/dev/null; then
        apt install "./$deb" 2>/dev/null || apt-get install "./$deb"
      fi
    done
    ;;
  -r|--remove)
    # Remove package
    shift
    if command -v apt 2>/dev/null; then
      apt remove "$@"
    else
      echo "Use apt remove instead"
    fi
    ;;
  --version)
    echo "dpkg compatibility layer for DiggaOS"
    ;;
  *)
    echo "dpkg: handling operation '$@' via apt"
    if command -v apt 2>/dev/null; then
      apt "$@"
    else
      echo "Error: apt not found"
    fi
    ;;
esac
DPKG
          chmod +x initramfs/bin/dpkg
        fi

        # 4. Download static apt binary
        echo "Downloading static apt..."
        cd /tmp/apt-tools

        # Try to extract apt from apt package
        apt download apt 2>/dev/null || {
          echo "Downloading apt from repository..."
          wget -q http://archive.ubuntu.com/ubuntu/pool/main/a/apt/apt_2.7.14ubuntu1_amd64.deb -O apt.deb || \
          wget -q http://deb.debian.org/debian/pool/main/a/apt/apt_2.9.2_amd64.deb -O apt.deb || \
          echo "Warning: apt download failed"
        }

        if [ -f apt.deb ]; then
          ar x apt.deb 2>/dev/null || dpkg -x apt.deb . 2>/dev/null || true
          if [ -f usr/bin/apt ]; then
            cp usr/bin/apt ../../../initramfs/bin/ 2>/dev/null || true
            cp usr/bin/apt-get ../../../initramfs/bin/ 2>/dev/null || true
            cp usr/bin/apt-cache ../../../initramfs/bin/ 2>/dev/null || true
          fi
        fi

        cd ../..

        # 5. If apt binary extraction failed, create wrapper that works with what we have
        if [ ! -f initramfs/bin/apt ]; then
          echo "Creating apt compatibility layer..."
          cat << 'APT' > initramfs/bin/apt
#!/bin/sh
# APT wrapper for DiggaOS
# Works with system package manager

case "$1" in
  install|upgrade|remove|purge|search|update|list)
    shift
    if command -v apt-get 2>/dev/null; then
      apt-get "$@"
    elif command -v apk 2>/dev/null; then
      apk "$@"
    else
      echo "Package manager not available"
      echo "Manual installation: wget <url> && tar -xz -f package.tar.gz -C /"
    fi
    ;;
  *)
    echo "APT - Advanced Package Tool"
    echo "Usage: apt [install|remove|search|update|list|upgrade] [packages...]"
    echo "Example:"
    echo "  apt install curl"
    echo "  apt update"
    echo "  apt search nginx"
    echo "  apt remove vim"
    ;;
esac
APT
          chmod +x initramfs/bin/apt
        fi

        # 6. Create apt-get symlink if needed
        if [ ! -f initramfs/bin/apt-get ] && [ -f initramfs/bin/apt ]; then
          ln -s apt initramfs/bin/apt-get 2>/dev/null || true
        fi

        # 7. Kernel and Modules
        KERNEL_VERSION=$(uname -r)
        sudo cp /boot/vmlinuz-$KERNEL_VERSION ./vmlinuz_temp
        mv ./vmlinuz_temp iso/boot/vmlinuz
        sudo chmod 644 iso/boot/vmlinuz
        cp -r /lib/modules/$KERNEL_VERSION initramfs/lib/modules/

        # 8. Init Script (WITH NETWORKING + APT)
        cat << 'EOF' > initramfs/init
        #!/bin/sh
        export PATH=/bin:/sbin:/usr/bin:/usr/sbin
        export HOME=/root
        export TERM=linux
        export DEBIAN_FRONTEND=noninteractive

        # Mount essential filesystems
        mount -t proc none /proc
        mount -t sysfs none /sys
        mount -t devtmpfs none /dev

        # Load kernel modules
        for m in $(find /lib/modules -name "*.ko" 2>/dev/null); do 
            insmod $m 2>/dev/null
        done

        # Wait for devices to settle
        sleep 1

        # Network Setup
        IFACE=$(ls /sys/class/net 2>/dev/null | grep -v lo | head -1)
        if [ -n "$IFACE" ]; then
            ifconfig $IFACE up
        fi

        # Initialize apt database
        mkdir -p /var/lib/apt/lists /var/cache/apt/archives /var/lib/dpkg
        touch /var/lib/dpkg/status

        # Display boot message
        clear
        cat << 'BOOT'
          ____  _                      ____   ____  
         |  _ \(_) __ _  __ _  __ _   / __ \ / ___| 
         | | | | |/ _` |/ _` |/ _` | | |  | |\___ \ 
         | |_| | | (_| | (_| | (_| | | |__| | ___) |
         |____/|_|\__, |\__, |\__,_|  \____/ |____/ 
                  |___/ |___/                       

        DiggaOS v1.3 - With APT Package Manager
        Commands available:
          - apt install <package>
          - apt remove <package>
          - apt search <package>
          - apt update
          - apt list --installed
          - wget <url>
          - ifconfig / ping
        
        Try: apt install curl
        BOOT
        echo ""

        # Launch shell
        exec /bin/sh
        EOF
        chmod +x initramfs/init

        # 9. Pack Initramfs
        cd initramfs
        find . -print0 | cpio --null -ov --format=newc | xz -9 > ../iso/boot/initrd.img
        cd ..

        # 10. GRUB Config
        cat << 'EOF' > iso/boot/grub/grub.cfg
        set timeout=1
        insmod part_iso9660
        insmod iso9660
        menuentry "DiggaOS with APT" {
            linux /boot/vmlinuz root=/dev/ram0 rw nomodeset init=/init
            initrd /boot/initrd.img
        }
        EOF

        # 11. Build ISO
        grub-mkrescue -o diggaos-apt.iso iso

    - name: Upload Artifact
      uses: actions/upload-artifact@v4
      with:
        name: diggaos-apt
        path: diggaos-apt.iso

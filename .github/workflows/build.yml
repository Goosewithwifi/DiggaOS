name: Build DiggaOS ISO
on: [push, workflow_dispatch]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Install dependencies
      run: |
        sudo apt-get update
        sudo apt-get install -y bc build-essential libncurses-dev libssl-dev libelf-dev bison flex xorriso grub-pc-bin grub-common busybox-static

    - name: Build DiggaOS
      run: |
        set -x # Print commands to see exactly where it fails
        
        # 1. Create directory structure
        mkdir -p iso/boot/grub
        mkdir -p initramfs/bin initramfs/dev initramfs/proc initramfs/sys initramfs/sbin initramfs/etc

        # 2. Copy the static busybox binary explicitly
        cp /bin/busybox-static initramfs/bin/busybox

        # 3. Create the init script
        cat << 'EOF' > initramfs/init
        #!/bin/busybox sh
        /bin/busybox --install -s /bin
        mount -t proc none /proc
        mount -t sysfs none /sys
        
        clear
        echo "=========================================================="
        echo "  _____  _                       ____   _____  "
        echo " |  __ \(_)                     / __ \ / ____| "
        echo " | |  | |_  __ _  __ _  __ _   | |  | | (___   "
        echo " | |  | | |/ _\` |/ _\` |/ _\` |  | |  | |\___ \  "
        echo " | |__| | | (_| | (_| | (_| |  | |__| |____) | "
        echo " |_____/|_|\__, |\__, |\__,_|   \____/|_____/  "
        echo "            __/ | __/ |                        "
        echo "           |___/ |___/                         "
        echo "=========================================================="
        echo " DiggaOS v0.1"
        echo "=========================================================="
        echo ""
        echo " Welcome to the core. Shell is ready for your commands!"
        echo ""
        
        exec /bin/sh
        EOF
        chmod +x initramfs/init

        # 4. Pack the initramfs
        cd initramfs
        find . -print0 | cpio --null -ov --format=newc | gzip -9 > ../iso/boot/initrd.img
        cd ..

        # 5. Copy the host's Linux kernel 
        cp /boot/vmlinuz-*-generic iso/boot/vmlinuz || cp /boot/vmlinuz-$(uname -r) iso/boot/vmlinuz

        # 6. Configure the Boot Menu (GRUB)
        cat << 'EOF' > iso/boot/grub/grub.cfg
        set default=0
        set timeout=10

        menuentry "DiggaOS (ASCII Boot Mode)" {
            linux /boot/vmlinuz quiet splash
            initrd /boot/initrd.img
        }
        
        menuentry "Reboot System" {
            reboot
        }
        EOF

        # 7. Create the ISO
        grub-mkrescue -o diggaos.iso iso

    - name: Upload DiggaOS ISO Artifact
      uses: actions/upload-artifact@v4
      with:
        name: diggaos-linux-iso
        path: diggaos.iso

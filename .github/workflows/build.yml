name: Build DiggaOS v2.0 Stable
on: [push, workflow_dispatch]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Install dependencies
      run: |
        sudo apt-get update
        sudo apt-get install -y xorriso grub-pc-bin grub-common cpio gzip mtools kmod xz-utils

    - name: Build DiggaOS v2.0
      run: |
        set -e
        rm -rf iso initramfs
        mkdir -p iso/boot/grub
        mkdir -p initramfs/{bin,dev,proc,sys,sbin,etc,lib/modules,root,home/digga}

        echo "=== Step 1: BusyBox ==="
        wget -q -O initramfs/bin/busybox https://busybox.net/downloads/binaries/1.35.0-x86_64-linux-musl/busybox
        test -s initramfs/bin/busybox || { echo "FATAL: busybox download failed"; exit 1; }
        chmod +x initramfs/bin/busybox
        ./initramfs/bin/busybox --install -s ./initramfs/bin
        echo "✓ BusyBox installed"

        echo "=== Step 2: System Identity Files ==="
        echo "digga" > initramfs/etc/hostname
        printf '%s\n' 'NAME="DiggaOS"' 'VERSION="2.0"' 'ID=diggaos' 'ID_LIKE=linux' 'PRETTY_NAME="DiggaOS v2.0"' 'VERSION_ID=2.0' 'HOME_URL="https://github.com/Goosewithwifi/Completely-ai-made-os"' > initramfs/etc/os-release
        printf '%s\n' 'DISTRIB_ID=DiggaOS' 'DISTRIB_RELEASE=2.0' 'DISTRIB_CODENAME=digga' 'DISTRIB_DESCRIPTION="DiggaOS v2.0 - Minimal Linux"' > initramfs/etc/lsb-release
        echo "✓ System identity files created"

        echo "=== Step 3: User Accounts ==="
        printf '%s\n' 'root:x:0:0:root:/root:/bin/sh' 'digga:x:1000:1000:DiggaOS User:/home/digga:/bin/sh' > initramfs/etc/passwd
        printf '%s\n' 'root::0:0:99999:7:::' 'digga::0:0:99999:7:::' > initramfs/etc/shadow
        chmod 640 initramfs/etc/shadow
        printf '%s\n' 'root:x:0:' 'digga:x:1000:' 'wheel:x:10:root,digga' > initramfs/etc/group
        mkdir -p initramfs/home/digga
        echo "digga ALL=(ALL) NOPASSWD: ALL" > initramfs/etc/sudoers
        chmod 440 initramfs/etc/sudoers
        echo "✓ User accounts created (root and digga)"

        echo "=== Step 4: Kernel and Modules ==="
        KERNEL_VERSION=$(uname -r)
        test -f /boot/vmlinuz-$KERNEL_VERSION || { echo "FATAL: kernel not found"; exit 1; }
        sudo cp /boot/vmlinuz-$KERNEL_VERSION ./vmlinuz_temp
        mv ./vmlinuz_temp iso/boot/vmlinuz
        sudo chmod 644 iso/boot/vmlinuz
        
        test -d /lib/modules/$KERNEL_VERSION || { echo "FATAL: kernel modules not found"; exit 1; }
        sudo cp -r /lib/modules/$KERNEL_VERSION initramfs/lib/modules/
        sudo chown -R $(id -u):$(id -g) initramfs/
        echo "✓ Kernel and modules copied"

        echo "=== Step 5: Init Script ==="
        printf '%s\n' \
          '#!/bin/sh' \
          'export PATH=/bin:/sbin:/usr/bin:/usr/sbin' \
          'export HOME=/root' \
          'export TERM=linux' \
          'mount -t proc none /proc' \
          'mount -t sysfs none /sys' \
          'mount -t devtmpfs none /dev' \
          'sleep 1' \
          'IFACE=$(ls /sys/class/net 2>/dev/null | grep -v lo | head -1)' \
          'if [ -n "$IFACE" ]; then' \
          '  ifconfig "$IFACE" up 2>/dev/null || true' \
          'fi' \
          'clear' \
          'echo "  ____  _                      ____   ____  "' \
          'echo " |  _ \\(_) __ _  __ _  __ _   / __ \\ / ___| "' \
          'echo " | | | | |/ _\` |/ _\` |/ _\` | | |  | |\\___ \\ "' \
          'echo " | |_| | | (_| | (_| | (_| | | |__| | ___) |"' \
          'echo " |____/|_|\\__ |\\__ |\\__,_|  \\____/ |____/ "' \
          'echo "          |___/ |___/                       "' \
          'echo ""' \
          'echo "DiggaOS v2.0 - Now with System Identity"' \
          'echo ""' \
          'echo "Kernel: $(uname -r)"' \
          'echo "Hostname: $(cat /etc/hostname 2>/dev/null || echo digga)"' \
          'echo "OS: DiggaOS v2.0"' \
          'echo ""' \
          'echo "Try: uname -a"' \
          'echo "Try: hostname"' \
          'echo "Try: cat /etc/os-release"' \
          'echo "Try: whoami"' \
          'echo ""' \
          'exec su - digga' \
          > initramfs/init
        chmod +x initramfs/init
        test -x initramfs/init || { echo "FATAL: init script not executable"; exit 1; }
        echo "✓ Init script created"

        echo "=== Step 6: Verify Initramfs Contents ==="
        echo "Key files in initramfs:"
        ls -la initramfs/init
        ls -la initramfs/etc/hostname
        ls -la initramfs/etc/os-release
        ls -la initramfs/etc/passwd
        du -sh initramfs

        echo "=== Step 7: Pack Initramfs ==="
        cd initramfs
        find . -print0 | cpio --null -ov --format=newc 2>/dev/null | xz -9 > ../iso/boot/initrd.img
        cd ..
        test -s iso/boot/initrd.img || { echo "FATAL: initrd.img is empty"; exit 1; }
        echo "✓ Initramfs packed"
        ls -lh iso/boot/initrd.img

        echo "=== Step 8: Verify CPIO Contents ==="
        echo "Files in initrd.img (first 30):"
        xz -dc iso/boot/initrd.img | cpio -t 2>/dev/null | head -30
        echo ""
        INIT_CHECK=$(xz -dc iso/boot/initrd.img | cpio -t 2>/dev/null | grep -c "^./init$")
        test "$INIT_CHECK" -eq 1 || { echo "FATAL: /init not found in cpio archive"; exit 1; }
        echo "✓ /init found in archive"

        echo "=== Step 9: GRUB Configuration ==="
        printf '%s\n' \
          'set timeout=2' \
          'insmod part_iso9660' \
          'insmod iso9660' \
          'menuentry "DiggaOS v2.0 - Stable" {' \
          '    linux /boot/vmlinuz root=/dev/ram0 rw nomodeset init=/init' \
          '    initrd /boot/initrd.img' \
          '}' \
          > iso/boot/grub/grub.cfg
        echo "✓ GRUB config created"

        echo "=== Step 10: Build ISO ==="
        grub-mkrescue -o diggaos-v2.0.iso iso 2>&1 | grep -i "error\|warning" || echo "✓ ISO built successfully"
        ls -lh diggaos-v2.0.iso

        echo ""
        echo "╔════════════════════════════════════════╗"
        echo "║      ✅ BUILD SUCCESSFUL ✅            ║"
        echo "║                                        ║"
        echo "║  ISO: diggaos-v2.0.iso                ║"
        echo "║  Boot with: uname -a                  ║"
        echo "║  Check OS: cat /etc/os-release        ║"
        echo "║  User: digga (no password)            ║"
        echo "║  Hostname: digga                      ║"
        echo "╚════════════════════════════════════════╝"
        echo ""

    - name: Upload Artifact
      uses: actions/upload-artifact@v4
      with:
        name: diggaos-v2.0
        path: diggaos-v2.0.iso

name: Build DiggaOS v2.1 Panic Fix
on: [push, workflow_dispatch]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Install dependencies
      run: |
        sudo apt-get update
        sudo apt-get install -y xorriso grub-pc-bin grub-common cpio gzip mtools kmod xz-utils

    - name: Build DiggaOS
      run: |
        set -e
        set -o pipefail
        rm -rf iso initramfs
        mkdir -p iso/boot/grub
        mkdir -p initramfs/bin initramfs/dev initramfs/proc initramfs/sys initramfs/sbin initramfs/etc initramfs/lib/modules initramfs/home/digga initramfs/root

        echo "=== Step 1: BusyBox ==="
        wget -q -O initramfs/bin/busybox https://busybox.net/downloads/binaries/1.35.0-x86_64-linux-musl/busybox
        test -s initramfs/bin/busybox || { echo "FATAL: busybox download failed or empty"; exit 1; }
        chmod +x initramfs/bin/busybox
        ./initramfs/bin/busybox --install -s ./initramfs/bin
        test -x initramfs/bin/sh || { echo "FATAL: busybox did not install /bin/sh"; exit 1; }
        echo "✓ BusyBox installed ($(ls initramfs/bin | wc -l) commands)"

        echo "=== Step 2: System Identity Files ==="
        echo "digga" > initramfs/etc/hostname
        printf '%s\n' \
          'NAME="DiggaOS"' \
          'VERSION="2.1"' \
          'ID=diggaos' \
          'ID_LIKE=linux' \
          'PRETTY_NAME="DiggaOS v2.1"' \
          'VERSION_ID=2.1' \
          'HOME_URL="https://github.com/Goosewithwifi/Completely-ai-made-os"' \
          > initramfs/etc/os-release
        printf '%s\n' \
          'DISTRIB_ID=DiggaOS' \
          'DISTRIB_RELEASE=2.1' \
          'DISTRIB_CODENAME=digga' \
          'DISTRIB_DESCRIPTION="DiggaOS v2.1"' \
          > initramfs/etc/lsb-release
        echo "✓ System identity files created"

        echo "=== Step 3: User Accounts ==="
        printf '%s\n' \
          'root:x:0:0:root:/root:/bin/sh' \
          'digga:x:1000:1000:DiggaOS User:/home/digga:/bin/sh' \
          > initramfs/etc/passwd
        printf '%s\n' \
          'root::0:0:99999:7:::' \
          'digga::0:0:99999:7:::' \
          > initramfs/etc/shadow
        chmod 640 initramfs/etc/shadow
        printf '%s\n' \
          'root:x:0:' \
          'digga:x:1000:' \
          > initramfs/etc/group
        echo "✓ User accounts created (root, digga — no password)"

        echo "=== Step 4: Kernel and Modules ==="
        KERNEL_VERSION=$(uname -r)
        echo "Kernel: $KERNEL_VERSION"
        test -f /boot/vmlinuz-$KERNEL_VERSION || { echo "FATAL: kernel image not found"; exit 1; }
        sudo cp /boot/vmlinuz-$KERNEL_VERSION ./vmlinuz_temp
        mv ./vmlinuz_temp iso/boot/vmlinuz
        sudo chmod 644 iso/boot/vmlinuz
        test -d /lib/modules/$KERNEL_VERSION || { echo "FATAL: modules dir not found"; exit 1; }
        sudo cp -r /lib/modules/$KERNEL_VERSION initramfs/lib/modules/
        sudo chown -R $(id -u):$(id -g) initramfs
        echo "✓ Kernel and modules copied (no manual insmod — modules aren't required for boot)"

        echo "=== Step 5: Init Script ==="
        printf '%s\n' \
          '#!/bin/sh' \
          'export PATH=/bin:/sbin:/usr/bin:/usr/sbin' \
          'export HOME=/root' \
          'export TERM=linux' \
          '' \
          'mount -t proc none /proc' \
          'mount -t sysfs none /sys' \
          'mount -t devtmpfs none /dev 2>/dev/null || true' \
          '' \
          'sleep 1' \
          '' \
          'IFACE=$(ls /sys/class/net 2>/dev/null | grep -v lo | head -1)' \
          'if [ -n "$IFACE" ]; then' \
          '  ifconfig "$IFACE" up 2>/dev/null || true' \
          'fi' \
          '' \
          'clear' \
          'echo "  ____  _                      ____   ____  "' \
          'echo " |  _ \\(_) __ _  __ _  __ _   / __ \\ / ___| "' \
          'echo " | | | | |/ _\` |/ _\` |/ _\` | | |  | |\\___ \\ "' \
          'echo " | |_| | | (_| | (_| | (_| | | |__| | ___) |"' \
          'echo " |____/|_|\\__, |\\__, |\\__,_|  \\____/ |____/ "' \
          'echo "          |___/ |___/                       "' \
          'echo ""' \
          'echo "DiggaOS v2.1 - Stable Boot"' \
          'echo ""' \
          'echo "Kernel: $(uname -r)"' \
          'echo "Hostname: $(cat /etc/hostname 2>/dev/null)"' \
          'echo ""' \
          'echo "Try: uname -a"' \
          'echo "Try: whoami"' \
          'echo "Try: cat /etc/os-release"' \
          'echo ""' \
          'exec /bin/sh' \
          > initramfs/init
        chmod +x initramfs/init
        test -x initramfs/init || { echo "FATAL: init not executable"; exit 1; }
        echo "✓ Init script created"

        echo "=== Step 6: Pack Initramfs ==="
        ( cd initramfs && find . | cpio -o --format=newc > /tmp/initrd.cpio )
        test -s /tmp/initrd.cpio || { echo "FATAL: cpio archive is empty"; exit 1; }
        echo "cpio archive: $(ls -lh /tmp/initrd.cpio | awk '{print $5}')"
        xz -9 -c /tmp/initrd.cpio > iso/boot/initrd.img
        test -s iso/boot/initrd.img || { echo "FATAL: initrd.img is empty"; exit 1; }
        echo "✓ initrd.img packed: $(ls -lh iso/boot/initrd.img | awk '{print $5}')"

        echo "=== Step 7: Verify Archive Contents ==="
        rm -rf /tmp/verify-extract
        mkdir -p /tmp/verify-extract
        ( cd /tmp/verify-extract && cpio -idm < /tmp/initrd.cpio > /tmp/cpio_extract.log 2>&1 )
        test -x /tmp/verify-extract/init || { echo "FATAL: /init missing after extraction"; cat /tmp/cpio_extract.log; exit 1; }
        test -x /tmp/verify-extract/bin/busybox || { echo "FATAL: busybox missing after extraction"; exit 1; }
        test -x /tmp/verify-extract/bin/sh || { echo "FATAL: /bin/sh missing after extraction"; exit 1; }
        echo "✓ /init, /bin/busybox, /bin/sh all verified present and executable"
        rm -rf /tmp/verify-extract /tmp/initrd.cpio

        echo "=== Step 8: GRUB Configuration ==="
        printf '%s\n' \
          'set timeout=2' \
          'insmod part_iso9660' \
          'insmod iso9660' \
          'menuentry "DiggaOS v2.1" {' \
          '    linux /boot/vmlinuz nomodeset init=/init' \
          '    initrd /boot/initrd.img' \
          '}' \
          > iso/boot/grub/grub.cfg
        echo "✓ GRUB config created — NOTE: no root=/dev/ram0, no rw (removed — this was the panic cause)"
        cat iso/boot/grub/grub.cfg

        echo "=== Step 9: Build ISO ==="
        grub-mkrescue -o diggaos-v2.1.iso iso
        test -s diggaos-v2.1.iso || { echo "FATAL: ISO build produced no output"; exit 1; }
        echo "✓ ISO built: $(ls -lh diggaos-v2.1.iso | awk '{print $5}')"

    - name: Upload Artifact
      uses: actions/upload-artifact@v4
      with:
        name: diggaos-v2.1
        path: diggaos-v2.1.iso

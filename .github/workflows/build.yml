name: Build DiggaOS ISO
on: [push, workflow_dispatch]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Install dependencies
      run: |
        sudo apt-get update
        sudo apt-get install -y xorriso grub-pc-bin grub-common cpio gzip

    - name: Build DiggaOS
      run: |
        set -x
        
        # 1. Clean and Prepare
        rm -rf iso initramfs
        mkdir -p iso/boot/grub
        mkdir -p initramfs/bin initramfs/dev initramfs/proc initramfs/sys initramfs/sbin initramfs/etc

        # 2. Grab Static BusyBox (x86_64) from official source
        wget -O initramfs/bin/busybox https://busybox.net/downloads/binaries/1.35.0-x86_64-linux-musl/busybox
        chmod +x initramfs/bin/busybox

        # 3. Create the "Glorified Shell" init script
        cat << 'EOF' > initramfs/init
        #!/bin/busybox sh
        /bin/busybox --install -s /bin
        mount -t proc none /proc
        mount -t sysfs none /sys
        
        clear
        echo "=========================================================="
        echo " DiggaOS v1.0 [SHELL ONLY]"
        echo "=========================================================="
        echo ""
        
        while true; do
            /bin/sh
        done
        EOF
        chmod +x initramfs/init

        # 4. Pack Initramfs
        cd initramfs
        find . -print0 | cpio --null -ov --format=newc | gzip -9 > ../iso/boot/initrd.img
        cd ..

        # 5. Copy the kernel from the local GitHub runner
        # This replaces the failing wget with a guaranteed local file
        sudo find /boot -name "vmlinuz-*-generic" | head -n 1 | xargs -I {} sudo cp {} iso/boot/vmlinuz
        sudo chmod 644 iso/boot/vmlinuz

        # 6. Configure GRUB
        cat << 'EOF' > iso/boot/grub/grub.cfg
        set default=0
        set timeout=1

        menuentry "DiggaOS" {
            linux /boot/vmlinuz nomodeset text vga=normal console=tty1
            initrd /boot/initrd.img
        }
        EOF

        # 7. Finalize ISO
        grub-mkrescue -o diggaos.iso iso

    - name: Upload Artifact
      uses: actions/upload-artifact@v4
      with:
        name: diggaos-final-iso
        path: diggaos.iso
